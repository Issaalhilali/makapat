<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nabih — UI Preview</title>
  <style>
    body {
      margin: 0; min-height: 100vh; font-family: "Tajawal", system-ui, sans-serif;
      color: #11263a;
      background:
        radial-gradient(900px 500px at 80% 10%, #f29a3e22, transparent),
        radial-gradient(800px 500px at 10% 90%, #2bb67322, transparent),
        linear-gradient(135deg, #f4f7fb, #e7eef6);
      display: flex; align-items: center; justify-content: center; padding: 40px;
    }
    .hint { max-width: 560px; text-align: center; line-height: 1.9; }
    .hint h1 { font-size: 22px; margin: 0 0 8px; }
    .hint p { color: #5b6b7b; margin: 4px 0; }
    .hint code { background: #11263a; color: #fff; padding: 2px 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="hint">
    <h1>معاينة مساعد نبيه</h1>
    <p>اضغط زر المحادثة في الأسفل (يمين الشاشة) لفتح النافذة.</p>
    <p>هذه صفحة معاينة لرؤية الهوية الجديدة (الأزرق الداكن + البرتقالي والأخضر)،
       تأثير الزجاج، الموضع أسفل اليمين، وبطاقات الدورات المقترحة.</p>
    <p>للأسعار جرّب: <code>أسعار الدورات</code></p>
  </div>
  <!-- Same-origin: the widget calls /api/nabih-chat and /api/nabih-featured here. -->
  <script src="/nabih-assistant.js" defer></script>
</body>
</html>
